<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC JE 服务器状态</title>
    <style>
        :root {
            --bg-color: #f4f4f4;
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-color: #dddddd;
            --primary-color: #333333;
            --hover-color: #555555;
            --tag-bg: #eeeeee;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background-color: var(--card-bg);
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 650px;
            box-sizing: border-box;
        }

        h1 {
            font-size: 1.4em;
            margin-top: 0;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 1em;
            box-sizing: border-box;
        }

        button {
            padding: 8px 16px;
            border: none;
            background-color: var(--primary-color);
            color: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1em;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--hover-color);
        }

        button:disabled {
            background-color: #999;
            cursor: not-allowed;
        }

        .info-block {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }

        .info-block:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .label {
            font-weight: 600;
            margin-right: 5px;
        }

        .motd {
            white-space: pre-wrap;
            font-family: monospace;
            background: #fafafa;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #eee;
            margin-top: 5px;
            line-height: 1.4;
        }

        .players-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .player-item {
            background-color: var(--tag-bg);
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.9em;
        }

        .status-error {
            color: red;
            font-weight: bold;
        }

        .hidden {
            display: none;
        }
        
        .server-icon {
            width: 64px;
            height: 64px;
            float: left;
            margin-right: 15px;
            border-radius: 4px;
            image-rendering: pixelated;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Minecraft 服务器状态</h1>
    
    <!-- 输入框区域，如果默认服务器存在则隐藏 -->
    <div id="inputArea" class="input-group">
        <input type="text" id="serverInput" placeholder="输入服务器地址 (如 play.example.com)">
        <button onclick="handleQuery()">查询</button>
    </div>

    <!-- 状态显示区域 -->
    <div id="statusArea" class="hidden">
        <div class="info-block">
            <span class="label">服务器:</span>
            <span id="serverName"></span>
            <button style="float: right; padding: 4px 10px; font-size: 0.9em;" onclick="refreshData()">刷新</button>
        </div>
        
        <div class="info-block">
            <img id="serverIcon" class="server-icon hidden" src="" alt="Icon">
            <div><span class="label">MOTD:</span></div>
            <div id="motdText" class="motd"></div>
            <div style="clear: both;"></div>
        </div>

        <div class="info-block">
            <span class="label">版本:</span>
            <span id="versionText"></span>
        </div>

        <div class="info-block">
            <span class="label">人数:</span>
            <span id="playersCount"></span>
        </div>

        <div class="info-block">
            <div><span class="label">在线玩家:</span></div>
            <div id="playersList" class="players-list"></div>
        </div>
    </div>

    <div id="errorMsg" class="status-error hidden"></div>
</div>

<script>
    // 1. 定义默认服务器变量。留空表示无默认服务器，需要输入或从URL获取。
    const default_svr = ""; 

    let currentServer = "";
    let lastRefreshTime = 0;
    let isFetching = false;

    // 2. 初始化：处理默认变量与URL参数 (?svr=xxxx)
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const paramSvr = urlParams.get('svr');

        // 优先级：default_svr > URL参数 > 无
        if (default_svr && default_svr.trim() !== "") {
            currentServer = default_svr.trim();
            document.getElementById('inputArea').classList.add('hidden');
            fetchStatus();
        } else if (paramSvr && paramSvr.trim() !== "") {
            currentServer = paramSvr.trim();
            document.getElementById('inputArea').classList.add('hidden');
            fetchStatus();
        } else {
            document.getElementById('inputArea').classList.remove('hidden');
        }
    };

    // 3. 输入框查询处理
    function handleQuery() {
        const inputVal = document.getElementById('serverInput').value.trim();
        if (inputVal) {
            currentServer = inputVal;
            fetchStatus();
        }
    }

    // 4. 刷新按钮处理
    function refreshData() {
        if (!currentServer) return;
        const now = Date.now();
        // 控制刷新间隔不小于1s
        if (now - lastRefreshTime < 1000) {
            showError("刷新过于频繁，请稍后再试 (需间隔至少1秒)。");
            return;
        }
        fetchStatus();
    }

    // 5. 核心：通过API获取数据
    async function fetchStatus(isRetry = false) {
        if (isFetching) return;
        isFetching = true;
        lastRefreshTime = Date.now();
        
        hideError();
        document.getElementById('statusArea').classList.remove('hidden');

        try {
            // 使用 api.mcstatus.io 作为后端协议解析代理
            const response = await fetch(`https://api.mcstatus.io/v2/status/java/${currentServer}`);
            if (!response.ok) throw new Error(`HTTP Error ${response.status}`);
            
            const data = await response.json();

            if (!data.online) {
                throw new Error("服务器离线或无法连接。");
            }

            // 填充基础信息
            document.getElementById('serverName').textContent = currentServer;
            document.getElementById('versionText').textContent = data.version.name_clean || "未知";
            document.getElementById('playersCount').textContent = `${data.players.online} / ${data.players.max}`;

            // 填充 MOTD
            document.getElementById('motdText').textContent = data.motd.clean.join('\n') || "无 MOTD";

            // 处理图标
            const iconEl = document.getElementById('serverIcon');
            if (data.icon) {
                iconEl.src = data.icon;
                iconEl.classList.remove('hidden');
            } else {
                iconEl.classList.add('hidden');
            }

            // 处理玩家列表
            const playersListEl = document.getElementById('playersList');
            playersListEl.innerHTML = '';
            
            let needRetry = false;
            if (data.players.list && data.players.list.length > 0) {
                data.players.list.forEach(player => {
                    const name = player.name_clean;
                    // 如果在线人数大于0，但列表里有空名字或者全是不可见字符，判定为无法解析
                    if (!name || name.trim() === "") {
                        needRetry = true;
                    } else {
                        const div = document.createElement('div');
                        div.className = 'player-item';
                        div.textContent = name;
                        playersListEl.appendChild(div);
                    }
                });
            } else if (data.players.online > 0) {
                // 服务端隐藏了列表，或者未能解析
                const div = document.createElement('div');
                div.className = 'player-item';
                div.textContent = `(${data.players.online} 人在线，但服务器未公开玩家列表)`;
                playersListEl.appendChild(div);
            } else {
                playersListEl.innerHTML = '<span style="color:#888;">暂无在线玩家</span>';
            }

            // 6. 如果发现匿名或无法解析的玩家名字，0.5s后自动重新请求
            if (needRetry && !isRetry) {
                console.log("检测到匿名/无法解析玩家，0.5s后重试...");
                isFetching = false; // 释放锁以便重试
                setTimeout(() => fetchStatus(true), 500);
                return;
            }

        } catch (error) {
            showError(error.message);
        } finally {
            isFetching = false;
        }
    }

    function showError(msg) {
        const errEl = document.getElementById('errorMsg');
        errEl.textContent = msg;
        errEl.classList.remove('hidden');
    }

    function hideError() {
        document.getElementById('errorMsg').classList.add('hidden');
    }
</script>

</body>
</html>
